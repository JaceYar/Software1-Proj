version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: booking-backend
    environment:
      # Override this on server via .env to include your production domain.
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/booking.db
    volumes:
      - booking-data:/app/data
    networks:
      - app-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-network
      - traefik.http.routers.booking-api.rule=Host(`${APP_HOST}`) && PathPrefix(`/api`)
      - traefik.http.routers.booking-api.entrypoints=websecure
      - traefik.http.routers.booking-api.tls=true
      - traefik.http.routers.booking-api.tls.certresolver=letsencrypt
      - traefik.http.routers.booking-api.priority=100
      - traefik.http.services.booking-api.loadbalancer.server.port=8080
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: booking-frontend
    networks:
      - app-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=app-network
      - traefik.http.routers.booking-web.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.booking-web.entrypoints=websecure
      - traefik.http.routers.booking-web.tls=true
      - traefik.http.routers.booking-web.tls.certresolver=letsencrypt
      - traefik.http.services.booking-web.loadbalancer.server.port=80
    restart: unless-stopped

volumes:
  booking-data:

networks:
  app-network:
    external: true
