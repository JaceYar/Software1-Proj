app = "software1-proj"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_DATASOURCE_URL = "jdbc:sqlite:/data/booking.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[mounts]]
  source = "booking_data"
  destination = "/data"
